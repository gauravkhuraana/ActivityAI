name: Group Activity — All Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: group-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run All Test Suites
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Start backend server
        working-directory: backend
        run: node server.js &

      - name: Wait for backend (port 4000)
        run: npx wait-on http://localhost:4000/employees --timeout 30000

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Start frontend dev server
        working-directory: frontend
        run: npm run dev &

      - name: Wait for frontend (port 5173)
        run: npx wait-on http://localhost:5173 --timeout 30000

      - name: Install GROUP_ACTIVITY dependencies
        working-directory: GROUP_ACTIVITY
        run: npm ci

      - name: Install Playwright browsers
        working-directory: GROUP_ACTIVITY
        run: npx playwright install --with-deps chromium

      - name: Phase 1 — Backend API tests (Jest + Supertest)
        working-directory: GROUP_ACTIVITY
        run: npm run test:backend
        continue-on-error: true

      - name: Create BDD report directory
        run: mkdir -p GROUP_ACTIVITY/bdd-report

      - name: Phase 2 — BDD tests (Cucumber)
        working-directory: GROUP_ACTIVITY
        run: npm run test:bdd
        continue-on-error: true

      - name: Phase 3 — E2E tests (Playwright)
        working-directory: GROUP_ACTIVITY
        run: npx playwright test --reporter=html
        continue-on-error: true

      - name: Upload Playwright HTML report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: group-playwright-report
          path: GROUP_ACTIVITY/playwright-report/
          retention-days: 30

      - name: Upload BDD report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: group-bdd-report
          path: GROUP_ACTIVITY/bdd-report/
          retention-days: 30
