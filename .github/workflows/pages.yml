name: Publish Reports to GitHub Pages

on:
  workflow_run:
    workflows:
      - "Solo Activity — E2E Tests"
      - "Group Activity — All Tests"
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Merge reports and deploy to GitHub Pages
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion != 'cancelled'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download solo report artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: playwright.yml
          name: solo-playwright-report
          path: _site/solo
          if_no_artifact_found: warn
          search_artifacts: true

      - name: Download group Playwright report artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: group-activity.yml
          name: group-playwright-report
          path: _site/group
          if_no_artifact_found: warn
          search_artifacts: true

      - name: Create index page with links to both reports
        run: |
          mkdir -p _site
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>ActivityAI — Test Reports</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; color: #24292f; }
              h1 { font-size: 1.8rem; margin-bottom: 8px; }
              p { color: #57606a; margin-bottom: 40px; }
              .cards { display: flex; gap: 20px; flex-wrap: wrap; }
              .card { flex: 1; min-width: 220px; border: 1px solid #d0d7de; border-radius: 10px; padding: 24px; text-decoration: none; color: inherit; transition: box-shadow .15s; }
              .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.12); }
              .card h2 { font-size: 1.1rem; margin: 0 0 8px; }
              .card span { font-size: .85rem; color: #57606a; }
              .badge { display: inline-block; margin-top: 12px; padding: 2px 10px; border-radius: 20px; font-size: .75rem; font-weight: 600; background: #dafbe1; color: #116329; }
            </style>
          </head>
          <body>
            <h1>ActivityAI — Test Reports</h1>
            <p>Playwright HTML reports for both test activity tracks.</p>
            <div class="cards">
              <a class="card" href="solo/index.html">
                <h2>SOLO_ACTIVITY</h2>
                <span>Playwright E2E — 45 tests</span>
                <div class="badge">View Report →</div>
              </a>
              <a class="card" href="group/index.html">
                <h2>GROUP_ACTIVITY</h2>
                <span>E2E + Backend + BDD — ~86 tests</span>
                <div class="badge">View Report →</div>
              </a>
            </div>
          </body>
          </html>
          EOF

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload combined site to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
