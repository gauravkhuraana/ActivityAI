name: Group Activity — Tests & Pages

on:
  push:
    branches: [main]
    paths:
      - 'GROUP_ACTIVITY/**'
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/group-activity.yml'
  pull_request:
    branches: [main]
    paths:
      - 'GROUP_ACTIVITY/**'
      - 'backend/**'
      - 'frontend/**'

# Allow only one concurrent deployment per branch
concurrency:
  group: group-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run All Test Suites
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Backend ────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Start backend server
        working-directory: backend
        run: node server.js &

      - name: Wait for backend (port 4000)
        run: npx wait-on http://localhost:4000/employees --timeout 30000

      # ── Frontend ───────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Start frontend dev server
        working-directory: frontend
        run: npm run dev &

      - name: Wait for frontend (port 5173)
        run: npx wait-on http://localhost:5173 --timeout 30000

      # ── GROUP_ACTIVITY dependencies ────────────────────────────────────────
      - name: Install GROUP_ACTIVITY dependencies
        working-directory: GROUP_ACTIVITY
        run: npm ci

      - name: Install Playwright browsers
        working-directory: GROUP_ACTIVITY
        run: npx playwright install --with-deps chromium

      # ── Phase 1: Backend API tests ─────────────────────────────────────────
      - name: Phase 1 — Backend API tests (Jest + Supertest)
        working-directory: GROUP_ACTIVITY
        run: npm run test:backend
        continue-on-error: true

      # ── Phase 2: BDD tests ─────────────────────────────────────────────────
      - name: Create BDD report directory
        run: mkdir -p GROUP_ACTIVITY/bdd-report

      - name: Phase 2 — BDD tests (Cucumber)
        working-directory: GROUP_ACTIVITY
        run: npm run test:bdd
        continue-on-error: true

      # ── Phase 3: E2E Playwright tests ──────────────────────────────────────
      - name: Phase 3 — E2E tests (Playwright)
        working-directory: GROUP_ACTIVITY
        run: npx playwright test --reporter=html
        continue-on-error: true

      # ── Artifacts ──────────────────────────────────────────────────────────
      - name: Upload Playwright HTML report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: GROUP_ACTIVITY/playwright-report/
          retention-days: 30

      - name: Upload BDD report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bdd-report
          path: GROUP_ACTIVITY/bdd-report/
          retention-days: 30

      # ── GitHub Pages (Playwright HTML report) ──────────────────────────────
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Playwright report to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: GROUP_ACTIVITY/playwright-report/

  deploy:
    name: Publish Report to GitHub Pages
    needs: test
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
