name: Playwright E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    name: Run E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Start backend
        working-directory: backend
        run: node server.js &

      - name: Wait for backend
        run: npx wait-on http://localhost:4000/employees --timeout 30000

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Start frontend
        working-directory: frontend
        run: npm run dev &

      - name: Wait for frontend
        run: npx wait-on http://localhost:5173 --timeout 30000

      - name: Install SOLO_ACTIVITY dependencies
        working-directory: SOLO_ACTIVITY
        run: npm install

      - name: Install Playwright browsers
        working-directory: SOLO_ACTIVITY
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: SOLO_ACTIVITY
        run: npx playwright test --reporter=html,list
        continue-on-error: true

      - name: Upload Playwright report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: SOLO_ACTIVITY/playwright-report/
          retention-days: 30

      - name: Setup GitHub Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: SOLO_ACTIVITY/playwright-report/

  deploy:
    name: Publish report to GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    if: always()

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
